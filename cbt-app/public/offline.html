<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | CBT App</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #e2e8f0, #f8fafc);
        font-family: Arial, sans-serif;
        color: #0f172a;
      }
      .card {
        width: min(92vw, 520px);
        background: white;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }
      p {
        line-height: 1.6;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>The CBT app is still available for already cached pages and saved exam progress.</p>
      <p>Reconnect to sync new results, fresh exams, and admin updates.</p>
    </main>
  </body>
  </html>
